services:
  api:
    build: { context: .., dockerfile: infra/Dockerfile }
    ports: ["8000:8000"]
    env_file: ../.env
  ui:
    build: { context: .., dockerfile: infra/Dockerfile }
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    env_file: ../.env
