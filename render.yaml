services:
  - type: web
    name: agriagent
    runtime: docker
    dockerfilePath: ./infra/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_API_KEY
        sync: false   # set this in the Render dashboard (kept secret)
